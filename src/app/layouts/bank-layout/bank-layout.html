<div class="bank-portal min-h-screen bg-gray-50 flex flex-col text-slate-800 font-sans pb-16 md:pb-0">
  <!-- Top Navigation Bar -->
  <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-6 sticky top-0 z-50">
    <div class="flex items-center gap-8 w-1/3">
      <h1 class="text-primary text-2xl font-bold tracking-tight">CCMS</h1>
      <div class="relative w-full max-w-md hidden md:block">
        <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">search</mat-icon>
        <input type="text" placeholder="Search Cases (Cmd + K)" class="w-full bg-gray-50 border border-gray-200 rounded-lg py-2 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
      </div>
    </div>
    <div class="flex items-center gap-4 text-gray-600">
      <button (click)="onLogout()" class="hover:text-primary transition-colors p-2 rounded-full hover:bg-gray-50"><mat-icon>logout</mat-icon></button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Left Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 flex-shrink-0 flex flex-col hidden md:flex">
      <div class="p-6 border-b border-gray-100 flex items-center gap-4">
        <div class="w-12 h-12 rounded-full bg-primary-light flex items-center justify-center text-primary font-bold shadow-sm">
          BO
        </div>
        <div>
          <div class="font-semibold text-gray-900 leading-tight">Bank Officer</div>
          <div class="text-xs text-gray-500 font-medium">Financial Recoveries</div>
        </div>
      </div>
      <nav class="flex-1 p-4 space-y-1">
        <a routerLink="/bank/dashboard" routerLinkActive="bg-primary-light text-primary" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-xl font-medium transition-colors">
          <mat-icon class="text-lg">dashboard</mat-icon>
          Dashboard
        </a>
        <a routerLink="/bank/cases" routerLinkActive="bg-primary-light text-primary" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-xl font-medium transition-colors">
          <mat-icon class="text-lg">inbox</mat-icon>
          Case Inbox
        </a>
        <a routerLink="/bank/batch-processing" routerLinkActive="bg-primary-light text-primary" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-xl font-medium transition-colors">
          <mat-icon class="text-lg">layers</mat-icon>
          Batch Processing
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Bottom Navigation Bar for Mobile -->
  <div class="md:hidden bg-white border-t border-gray-200 h-16 fixed bottom-0 left-0 right-0 z-50 flex items-center justify-around px-4">
    <a routerLink="/bank/dashboard" routerLinkActive="text-primary font-bold" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center justify-center text-gray-500 hover:text-gray-900 transition-colors">
      <mat-icon class="text-xl">dashboard</mat-icon>
      <span class="text-[10px] mt-0.5">Dashboard</span>
    </a>
    <a routerLink="/bank/cases" routerLinkActive="text-primary font-bold" class="flex flex-col items-center justify-center text-gray-500 hover:text-gray-900 transition-colors">
      <mat-icon class="text-xl">inbox</mat-icon>
      <span class="text-[10px] mt-0.5">Inbox</span>
    </a>
    <a routerLink="/bank/batch-processing" routerLinkActive="text-primary font-bold" class="flex flex-col items-center justify-center text-gray-500 hover:text-gray-900 transition-colors">
      <mat-icon class="text-xl">layers</mat-icon>
      <span class="text-[10px] mt-0.5">Batch</span>
    </a>
  </div>
</div>
