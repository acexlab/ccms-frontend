apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ccms-ingress
  namespace: ccms
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "15m"
spec:
  tls:
  - hosts:
    - myapp.company.com
    secretName: ccms-tls-secret
  rules:
  - host: myapp.company.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ccms-backend-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ccms-frontend-service
            port:
              number: 80
