apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ccms-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      # Map API endpoints to the backend service, retaining '/api' prefix
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ccms-backend-service
            port:
              number: 80
              
      # Map all other page routes to the frontend SPA service
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ccms-frontend-service
            port:
              number: 80
