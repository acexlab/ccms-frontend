apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ccms-frontend-hpa
  namespace: ccms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ccms-frontend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
