apiVersion: apps/v1
kind: Deployment
metadata:
  name: ccms-frontend
  namespace: ccms
  labels:
    app: ccms-frontend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ccms-frontend
  template:
    metadata:
      labels:
        app: ccms-frontend
    spec:
      containers:
      - name: frontend
        image: ccmsacr9596.azurecr.io/ccms-frontend:$(Build.BuildId)
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10

