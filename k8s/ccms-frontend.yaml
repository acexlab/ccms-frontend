apiVersion: apps/v1
kind: Deployment
metadata:
  name: ccms-frontend
  namespace: ccms
  labels:
    app: ccms-frontend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ccms-frontend
  template:
    metadata:
      labels:
        app: ccms-frontend
    spec:
      containers:
      - name: frontend
        image: ccmsacr9596.azurecr.io/ccms-frontend:$(Build.BuildId)
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ccms-frontend-service
  namespace: ccms
  labels:
    app: ccms-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: ccms-frontend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ccms-frontend-hpa
  namespace: ccms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ccms-frontend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ccms-ingress
  namespace: ccms
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "15m"
spec:
  tls:
  - hosts:
    - myapp.company.com
    secretName: ccms-tls-secret
  rules:
  - host: myapp.company.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ccms-backend-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ccms-frontend-service
            port:
              number: 80
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ccms-backend-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ccms-frontend-service
            port:
              number: 80
