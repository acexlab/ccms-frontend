trigger:
  branches:
    include:
      - fix/deployment

variables:
  # Reference Azure DevOps Variable Group containing secrets
  - group: ccms-vg
  - name: azureSubscription
    value: 'ccms-azure-sc'
  - name: containerRegistryConnection
    value: 'ccms-acr-sc'
  - name: aksConnection
    value: 'ccms-aks-sc'
  - name: acrHost
    value: 'ccmsacr.azurecr.io'
  - name: k8sNamespace
    value: 'ccms'

stages:
- stage: Build
  displayName: 'Build and Push Stage'
  jobs:
  - job: BuildAndPush
    displayName: 'Build & Push Docker Images'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    # Build & Push Frontend Image
    - task: Docker@2
      displayName: 'Build and Push Frontend to ACR'
      inputs:
        containerRegistry: '$(containerRegistryConnection)'
        repository: 'ccms-frontend'
        command: 'buildAndPush'
        Dockerfile: 'docker/frontend.Dockerfile'
        buildContext: 'ccms-frontend'
        tags: |
          $(Build.BuildId)

    # Build & Push Backend Image
    - task: Docker@2
      displayName: 'Build and Push Backend to ACR'
      inputs:
        containerRegistry: '$(containerRegistryConnection)'
        repository: 'ccms-backend'
        command: 'buildAndPush'
        Dockerfile: 'docker/backend.Dockerfile'
        buildContext: 'ccms-backend'
        tags: |
          $(Build.BuildId)

- stage: Deploy
  displayName: 'Deploy Stage'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeployToAKS
    displayName: 'Deploy to AKS'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    # Authenticate to AKS and create/update Secrets dynamically
    - task: AzureCLI@2
      displayName: 'Configure AKS Secrets'
      inputs:
        azureSubscription: '$(azureSubscription)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials --resource-group ccms-rg --name ccms-aks --overwrite-existing
          
          # Create Namespace if not exists
          kubectl create namespace $(k8sNamespace) --dry-run=client -o yaml | kubectl apply -f -
          
          # Create or Update Kubernetes Secrets using pipeline variables from the variable group
          kubectl create secret generic ccms-secrets \
            --namespace=$(k8sNamespace) \
            --from-literal=DB_CONNECTION_STRING="$(DB_CONNECTION_STRING)" \
            --from-literal=JWT_SECRET="$(JWT_SECRET)" \
            --from-literal=JWT_ISSUER="$(JWT_ISSUER)" \
            --from-literal=JWT_AUDIENCE="$(JWT_AUDIENCE)" \
            --from-literal=API_KEYS="$(API_KEYS)" \
            --from-literal=AZURE_STORAGE_CONNECTION_STRING="$(AZURE_STORAGE_CONNECTION_STRING)" \
            --dry-run=client -o yaml | kubectl apply -f -

    # Deploy all other manifests using KubernetesManifest task
    - task: KubernetesManifest@1
      displayName: 'Deploy manifests to AKS'
      inputs:
        connectionType: 'kubernetesServiceConnection'
        kubernetesServiceConnection: '$(aksConnection)'
        namespace: '$(k8sNamespace)'
        manifests: |
          k8s/configmap.yaml
          k8s/frontend-deployment.yaml
          k8s/frontend-service.yaml
          k8s/backend-deployment.yaml
          k8s/backend-service.yaml
          k8s/ingress.yaml
          k8s/frontend-hpa.yaml
          k8s/backend-hpa.yaml
        containers: |
          $(acrHost)/ccms-frontend:$(Build.BuildId)
          $(acrHost)/ccms-backend:$(Build.BuildId)
